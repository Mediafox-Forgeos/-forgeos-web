version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    groups:
      # Group routine version bumps into one PR per week instead of one per
      # package — dozens of individual dependency PRs is noise, not signal.
      minor-and-patch:
        update-types:
          - 'minor'
          - 'patch'
    open-pull-requests-limit: 10

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'

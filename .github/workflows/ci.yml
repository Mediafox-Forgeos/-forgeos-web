name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          # forgeos-web, forge-labs and movos-web only need NEXT_PUBLIC_* values
          # at build time for client bundling; empty values keep the build
          # deterministic without requiring real secrets in CI.
          NEXT_PUBLIC_MOVOS_API_URL: http://localhost:4000
          NEXT_PUBLIC_GOOGLE_MAPS_BROWSER_API_KEY: ''
          # movos-api's build runs `prisma generate`, which only reads
          # schema.prisma — no live database connection is required.
          DATABASE_URL: 'postgresql://ci:ci@localhost:5432/ci'
